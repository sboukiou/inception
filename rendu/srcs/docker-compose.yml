services:
  mariadb:
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    container_name: mariadb
    image: mariadb
    restart: on-failure
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
    env_file: .env
    secrets: 
      - db_password
      - db_root_password
  wordpress:
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    container_name: wordpress
    image: wordpress
    restart: on-failure
    volumes:
      - wordpress_data:/var/www/wordpress
    networks:
      - inception
    depends_on:
      - mariadb
    env_file: .env
    secrets:
      - wp_password
      - wp_admin_password
      - db_password
  nginx:
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    container_name: nginx
    image: nginx
    restart: on-failure
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/wordpress
    networks:
      - inception
    depends_on:
      - wordpress
    env_file: .env
  adminer:
    build:
      context: ./requirements/bonus/adminer
      dockerfile: Dockerfile
    container_name: adminer
    image: adminer
    restart: on-failure
    networks:
      - inception
    depends_on:
      - mariadb
    env_file: .env
    secrets:
      - adminer_password
  redis:
    build:
      context: ./requirements/bonus/redis
      dockerfile: Dockerfile
    container_name: redis
    image: redis
    restart: on-failure
    networks:
      - inception
    depends_on:
      - mariadb
    env_file: .env
  vsftpd:
    build:
      context: ./requirements/bonus/vsftpd
      dockerfile: Dockerfile
    container_name: vsftpd
    image: vsftpd
    restart: on-failure
    networks:
      - inception
    volumes:
      - wordpress_data:/var/www/wordpress
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    depends_on:
      - mariadb
    env_file: .env
    secrets:
      - ftp_password
  cohle:
    build:
      context: ./requirements/bonus/cohle
      dockerfile: Dockerfile
    container_name: cohle
    image: cohle
    restart: on-failure
    networks:
      - inception
    ports:
      - "8081:8081"


networks:
  inception:
    driver: bridge

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      device: "/home/sboukiou/data/mariadb"
      o: bind
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      device: "/home/sboukiou/data/wordpress"
      o: bind




secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_password:
    file: ../secrets/wp_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  adminer_password:
    file: ../secrets/adminer_password.txt
  ftp_password:
    file: ../secrets/ftp_password.txt
