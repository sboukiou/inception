listen=YES
listen_ipv6=NO

# Enable local users and allow them to write/modify files
local_enable=YES
write_enable=YES
local_umask=022

# Security: Jail users to their home directory (WordPress volume)
chroot_local_user=YES
allow_writeable_chroot=YES
secure_chroot_dir=/var/run/vsftpd/empty

# Networking: Passive Mode Configuration
# These must match the EXPOSE range in your Dockerfile
pasv_enable=YES
pasv_min_port=21100
pasv_max_port=21110
pasv_address=0.0.0.0

# Logging and Misc
anonymous_enable=NO
dirmessage_enable=YES
use_localtime=YES
xferlog_enable=YES
connect_from_port_20=YES
background=NO
