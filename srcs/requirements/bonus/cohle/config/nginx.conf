server {
    # Listen on the port you exposed in your Dockerfile
    listen 8081;
    server_name localhost;

    # Set the root to the directory created in your Dockerfile
    root /var/www/cohle;
    index index.html;

    # Handle requests by trying the file, then the directory, then 404
    location / {
        try_files $uri $uri/ =404;
    }

    # Optional: ensure correct media types for images like cohle.jpeg
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires max;
        log_not_found off;
    }
}
